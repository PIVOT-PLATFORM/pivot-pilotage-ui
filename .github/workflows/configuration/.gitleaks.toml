title = "PIVOT-PILOTAGE-UI Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "PIVOT-PILOTAGE-UI CI credentials and test paths"
regexes = [
    '''ci-(test|e2e|lighthouse)-[a-z-]*secret[a-z0-9-]*'''
]
paths = [
    '''src/.*\.spec\.ts$''',
    '''e2e/.*''',
    '''.*\.example$'''
]
