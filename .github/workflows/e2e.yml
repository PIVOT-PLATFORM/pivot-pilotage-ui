name: E2E

# Squelette bootstrap-only : aucune feature réelle (pas d'auth, pas d'appel pivot-core) —
# contrairement à pivot-ui, ce workflow ne dépend d'AUCUN backend (pas de services
# postgres/redis/pivot-core). La spec Playwright ne fait que valider que le shell build/boot
# (route placeholder). À réviser dès la première vraie feature Pilotage (voir CLAUDE.md,
# TODO-SETUP.md §3).

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Serve Angular build
        # Projet Angular = "frontend" (pas d'outputPath custom dans angular.json) → dist/frontend/browser.
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Wait for frontend
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:4200/

      - name: Run Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
