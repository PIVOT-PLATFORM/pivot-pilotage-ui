name: E2E

# Historique (bootstrap) : à l'origine une seule route placeholder (features/home), aucun appel
# HTTP à un backend — ce workflow ne dépendait d'AUCUN backend (pas de services
# postgres/redis/pivot-core), il ne faisait que valider que le shell build/boot. TODO-SETUP.md §3
# l'excluait alors des status checks requis ("à revisiter dès la première vraie US de ce repo").
#
# Depuis US22.3.1 (roadmap rapide, `features/roadmap`) : une vraie feature appelle bien le
# backend (`GET/POST /api/pilotage/.../roadmap/lanes|initiatives`, `PATCH .../initiatives/{id}`).
# Aucun conteneur `pivot-pilotage-core` réel n'est démarré ici : ce backend n'a publié aucune
# image GHCR à ce jour (pas de release) — même constat et mitigation que
# `pivot-agilite-ui/.github/workflows/e2e.yml` pour son propre premier appel réel
# (`POST /api/agilite/retro/sessions`, US20.1.1). `e2e/roadmap-board.e2e.spec.ts` stubbe donc la
# réponse backend au niveau réseau via `page.route` (Playwright) — besoin uniquement du build
# Angular statique déjà servi ci-dessous, pas d'un backend démarré. À réintroduire un vrai
# `pivot-pilotage-core` (:8081, jamais pivot-core :8080) — sur le modèle de
# `pivot-collaboratif-ui/e2e.yml` — dès qu'une image GHCR est publiée pour ce backend.
#
# Ce job tourne déjà (déclencheurs `push`/`pull_request` inconditionnels) — TODO-SETUP.md §3 est
# mis à jour pour l'ajouter à la liste des status checks requis maintenant qu'une vraie feature
# existe pour le couvrir.

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Serve Angular build
        # Projet Angular = "frontend" (pas d'outputPath custom dans angular.json) → dist/frontend/browser.
        run: npx --yes serve dist/frontend/browser -p 4200 --single &

      - name: Wait for frontend
        run: curl --retry 15 --retry-delay 1 --retry-connrefused --silent --output /dev/null http://localhost:4200/

      - name: Run Playwright
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
