<div
  class="weather-indicator"
  [class.weather-indicator--sunny]="weather().status === 'SUNNY'"
  [class.weather-indicator--cloudy]="weather().status === 'CLOUDY'"
  [class.weather-indicator--stormy]="weather().status === 'STORMY'"
  [class.weather-indicator--indeterminate]="isIndeterminate()"
  [attr.title]="isIndeterminate() ? (indeterminateReasonKey()! | transloco) : null"
>
  <svg
    class="weather-indicator__icon"
    [attr.data-weather-icon]="iconToken()"
    viewBox="0 0 20 20"
    width="16"
    height="16"
    aria-hidden="true"
    focusable="false"
  >
    @switch (weather().status) {
      @case ('SUNNY') {
        <circle cx="10" cy="10" r="4.5" />
        <path d="M10 0 L11.4 3.4 L8.6 3.4 Z" />
        <path d="M10 20 L11.4 16.6 L8.6 16.6 Z" />
        <path d="M0 10 L3.4 8.6 L3.4 11.4 Z" />
        <path d="M20 10 L16.6 8.6 L16.6 11.4 Z" />
        <path d="M2.9 2.9 L5.8 4.3 L4.3 5.8 Z" />
        <path d="M17.1 17.1 L14.2 15.7 L15.7 14.2 Z" />
        <path d="M2.9 17.1 L4.3 14.2 L5.8 15.7 Z" />
        <path d="M17.1 2.9 L15.7 5.8 L14.2 4.3 Z" />
      }
      @case ('CLOUDY') {
        <path d="M5 15 a4 4 0 1 1 0.6 -7.96 A5 5 0 0 1 15 8.5 A3.5 3.5 0 0 1 14.5 15 Z" />
      }
      @case ('STORMY') {
        <path d="M5 12 a3.2 3.2 0 1 1 0.5 -6.4 A4 4 0 0 1 13.5 6.5 A2.8 2.8 0 0 1 13 12 Z" />
        <path class="weather-indicator__bolt" d="M11 11 L7.5 16.5 L10 16.5 L8.5 20 L14 13 L11 13 Z" />
      }
      @case ('INDETERMINATE') {
        <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="2" />
        <text x="10" y="14.5" text-anchor="middle" font-size="10" font-weight="700">?</text>
      }
    }
  </svg>

  <span class="weather-indicator__label">{{ 'portfolio.weather.status.' + weather().status | transloco }}</span>

  @if (varianceLabel(); as variance) {
    <span class="weather-indicator__variance">{{
      'portfolio.weather.varianceLabel' | transloco: { value: variance }
    }}</span>
  }

  @if (isIndeterminate()) {
    <span class="weather-indicator__reason">{{ indeterminateReasonKey()! | transloco }}</span>
  }
</div>
